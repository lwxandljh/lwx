# ============================================================
# Simple Web CI/CD — Flask + Docker
#
# 流水线（禁用自动部署）:
#   1. validate → 安装依赖 + 运行测试
#   2. build    → 构建 Docker 镜像
# ============================================================

name: Flask CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ============================================
  # Job 1: 代码验证 + 测试
  # ============================================
  validate:
    name: "① 验证 & 测试"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行测试
        run: python -m pytest test_app.py -v

  # ============================================
  # Job 2: 构建 Docker 镜像
  # ============================================
  build:
    name: "② 构建镜像"
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 构建 Docker 镜像
        run: docker build -t simple-web:latest .

      - name: 验证镜像构建成功
        run: docker images | grep simple-web

  # ============================================
  # Job 3: 通知
  # ============================================
  notify:
    name: "③ 结果通知"
    needs: [validate, build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: 汇总
        run: |
          echo "========================================="
          echo "  CI/CD 流水线完成"
          echo "========================================="
          echo "  ① 验证测试 : ${{ needs.validate.result }}"
          echo "  ② 构建镜像 : ${{ needs.build.result }}"
          echo "========================================="